name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  schedule:
    - cron: '0 8 * * 1'  # Weekly on Monday at 08:00 UTC

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod

      - name: Build
        run: go build -mod=readonly -v ./...

      - name: Unit tests
        run: go test -mod=readonly -v -short -coverprofile=coverage.out ./...

      - name: Vulnerability scan
        run: go install golang.org/x/vuln/cmd/govulncheck@latest && govulncheck ./...

      - name: Upload coverage
        if: github.event_name != 'schedule'
        uses: codecov/codecov-action@b9fd7d16f6d7d1b5d2bec1a2887e65ceed900238  # v4
        with:
          files: coverage.out
          token: ${{ secrets.CODECOV_TOKEN }}

  integration:
    runs-on: ubuntu-latest
    if: github.event_name == 'push' || github.event_name == 'schedule'
    needs: test
    steps:
      - uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5  # v4

      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff  # v5
        with:
          go-version-file: go.mod

      - name: Integration tests
        if: env.TMDB_ACCESS_TOKEN != ''
        env:
          TMDB_ACCESS_TOKEN: ${{ secrets.TMDB_ACCESS_TOKEN }}
          TMDB_SESSION_ID: ${{ secrets.TMDB_SESSION_ID }}
          TMDB_ACCOUNT_ID: ${{ secrets.TMDB_ACCOUNT_ID }}
          TMDB_ACCOUNT_OBJECT_ID: ${{ secrets.TMDB_ACCOUNT_OBJECT_ID }}
        run: go test -mod=readonly -v -timeout 120s -run '^TestIntegration' ./...
